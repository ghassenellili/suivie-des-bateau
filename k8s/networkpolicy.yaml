apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flutter-app-network-policy
  namespace: flutter-app
spec:
  podSelector:
    matchLabels:
      app: flutter-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  - to:
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
